name: Release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x64
            runner: windows-latest
            archive: zip
          - target: linux-x64
            runner: ubuntu-latest
            archive: tar.gz
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            archive: tar.gz
          - target: macos-arm64
            runner: macos-15
            archive: tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 26.5.0
          cache: npm

      - name: Install and test
        run: npm ci && npm test

      - name: Verify release version
        id: version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" != "v${version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${version}" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build and smoke single executables
        run: npm run build:binary && npm run smoke:binary

      - name: Package Windows binaries
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "agentsession-${{ steps.version.outputs.version }}-${{ matrix.target }}"
          $stage = Join-Path artifacts $name
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item artifacts/binaries/agentsession.exe, artifacts/binaries/agentsession-mcp.exe, artifacts/binaries/binary-metadata.json, LICENSE, README.md, README.en.md -Destination $stage
          Compress-Archive -Path "$stage/*" -DestinationPath "artifacts/$name.zip"

      - name: Package Unix binaries
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          name="agentsession-${{ steps.version.outputs.version }}-${{ matrix.target }}"
          stage="artifacts/${name}"
          mkdir -p "$stage"
          cp artifacts/binaries/agentsession artifacts/binaries/agentsession-mcp artifacts/binaries/binary-metadata.json LICENSE README.md README.en.md "$stage/"
          chmod +x "$stage/agentsession" "$stage/agentsession-mcp"
          tar -C artifacts -czf "artifacts/${name}.tar.gz" "$name"

      - name: Upload binary archive
        uses: actions/upload-artifact@v4
        with:
          name: agentsession-${{ matrix.target }}
          path: artifacts/*.${{ matrix.archive }}
          if-no-files-found: error

  release:
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binary archives
        uses: actions/download-artifact@v4
        with:
          pattern: agentsession-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum agentsession-* > SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* --generate-notes --verify-tag --repo "$GITHUB_REPOSITORY"
          fi
